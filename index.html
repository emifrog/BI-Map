<!DOCTYPE html>
<html lang="fr" dir="ltr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="Cartographie des bouches d'incendie du 06" />
    <title>BI Map</title>

    <!-- Preload des ressources critiques -->
    <link rel="preload" href="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.css" as="style">
    <link rel="preload" href="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.js" as="script">
    <link rel="preload" href="style.css" as="style">

    <!-- Favicon -->
    <link rel="shortcut icon" href="images/favicon.ico" sizes="32x32" />

    <!-- Styles critiques -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">

    <!-- TODO: activer quand l'authentification sera prete
    <script>
        if (!localStorage.getItem('supabase_session')) {
            window.location.href = 'login.html';
        }
    </script>
    -->

    <script>
        // Enregistrement du Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('Service Worker enregistre avec succes:', registration.scope);
                    })
                    .catch(error => {
                        console.error('Erreur lors de l\'enregistrement du Service Worker:', error);
                    });
            });
        }
    </script>

    <!-- Scripts critiques -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.js"></script>

    <!-- Scripts non-critiques avec defer -->
    <script id="search-js" defer src="https://api.mapbox.com/search-js/v1.0.0-beta.22/web.js"></script>
    <script defer src="https://kit.fontawesome.com/8d747dca8a.js" crossorigin="anonymous"></script>
</head>

<body>

    <div id="map"></div>
    <div id="search-box-container">
        <div class="Suggestion"></div>
    </div>
    <div class="fab-container">
        <div class="fab fab-icon-holder">
            <i class="fas fa-plus"></i>
        </div>
        <ul class="fab-options">
            <li>
                <span class="fab-label">F.I.R.E</span>
                <button class="fab-button-fire" aria-label="Ouvrir les fiches F.I.R.E">
                    <div class="fab-icon-holder">
                        <i class="fas fa-fire"></i>
                    </div>
                </button>
            </li>
            <li>
                <span class="fab-label">Mesure</span>
                <button class="fab-button-mesure" aria-label="Activer l'outil de mesure de distance">
                    <div class="fab-icon-holder">
                        <i class="fas fa-ruler"></i>
                    </div>
                </button>
            </li>
            <li>
                <span class="fab-label">Centrer</span>
                <button class="fab-button-centrer" aria-label="Centrer sur la derniere recherche">
                    <div class="fab-icon-holder">
                        <i class="fas fa-crosshairs"></i>
                    </div>
                </button>
            </li>
            <li>
                <span class="fab-label">Contact</span>
                <button class="fab-button-contact" aria-label="Ouvrir le formulaire de contact">
                    <div class="fab-icon-holder">
                        <i class="fas fa-envelope"></i>
                    </div>
                </button>
            </li>
            <li>
                <span class="fab-label">Deconnexion</span>
                <button class="fab-button-logout" aria-label="Se deconnecter">
                    <div class="fab-icon-holder fab-icon-logout">
                        <i class="fas fa-sign-out-alt"></i>
                    </div>
                </button>
            </li>
        </ul>
    </div>

    <script src="js/main.js"></script>
    <script>
        // FAB toggle pour mobile (pas de hover sur tactile)
        const fab = document.querySelector('.fab');
        const fabOptions = document.querySelector('.fab-options');

        fab.addEventListener('click', (e) => {
            e.stopPropagation();
            fabOptions.classList.toggle('open');
        });

        // Fermer le menu FAB au clic ailleurs
        document.addEventListener('click', () => {
            fabOptions.classList.remove('open');
        });

        fabOptions.addEventListener('click', (e) => {
            e.stopPropagation();
        });

        // Actions des boutons FAB
        document.querySelector('.fab-button-fire').addEventListener('click', handleFireClick);
        document.querySelector('.fab-button-mesure').addEventListener('click', handleMesureClick);
        document.querySelector('.fab-button-centrer').addEventListener('click', handleCentrerClick);
        document.querySelector('.fab-button-contact').addEventListener('click', () => {
            window.location.href = 'contact.html';
        });
        document.querySelector('.fab-button-logout').addEventListener('click', () => {
            localStorage.removeItem('supabase_session');
            window.location.href = 'login.html';
        });
    </script>

</body>

</html>
