<!DOCTYPE html>
<html lang="fr" dir="ltr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="Cartographie des bouches d'incendie du 06" />
    <meta name="theme-color" content="#d23f31" />
    <title>BI Map</title>

    <!-- Preconnect pour accelerer les fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Preload des ressources critiques -->
    <link rel="preload" href="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.css" as="style">
    <link rel="preload" href="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.js" as="script">
    <link rel="preload" href="style.css" as="style">

    <!-- Favicon -->
    <link rel="shortcut icon" href="images/favicon.ico" sizes="32x32" />

    <!-- Styles critiques -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">

    <!-- Google Fonts non-bloquant -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">

    <!-- TODO: activer quand l'authentification sera prete
    <script>
        if (!localStorage.getItem('supabase_session')) {
            window.location.href = 'login.html';
        }
    </script>
    -->

    <script>
        // Enregistrement du Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('Service Worker enregistre avec succes:', registration.scope);
                    })
                    .catch(error => {
                        console.error('Erreur lors de l\'enregistrement du Service Worker:', error);
                    });
            });
        }
    </script>

    <!-- Scripts avec defer pour ne pas bloquer le rendu -->
    <script id="mapbox-gl" defer src="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.js"></script>
    <script id="search-js" defer src="https://api.mapbox.com/search-js/v1.0.0-beta.22/web.js"></script>

</head>

<body>

    <div id="map"></div>
    <div id="search-box-container">
        <div class="Suggestion"></div>
    </div>

            <li>

    <script defer src="js/main.js"></script>

</html>
